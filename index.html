<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTracker">
<meta name="theme-color" content="#0F6E56">
<meta name="description" content="Personal fat loss and workout tracker — 8-month program">
<title>Fit Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<header class="header">
  <div class="header-row">
    <div>
      <div class="header-title" id="header-title">Fit Tracker</div>
      <div class="header-date" id="header-date"></div>
    </div>
    <div class="streak-badge">
      <i class="ti ti-flame" style="font-size:14px" aria-hidden="true"></i>
      <span id="streak-count">0</span> day streak
    </div>
  </div>
</header>

<main>

  <!-- TODAY -->
  <section id="screen-today" class="screen active" aria-label="Today's workout">
    <div class="pad" id="today-content"></div>
  </section>

  <!-- WEEK -->
  <section id="screen-week" class="screen" aria-label="Weekly plan">
    <div class="pad">
      <div class="week-grid" id="week-grid"></div>
      <div id="week-detail"></div>
    </div>
  </section>

  <!-- PROGRESS -->
  <section id="screen-progress" class="screen" aria-label="Progress">
    <div class="pad">
      <div class="stats-grid" id="stats-grid"></div>

      <div id="phase-section"></div>

      <div class="section-label">Weight over time</div>
      <div id="weight-chart" style="margin-bottom:16px"></div>

      <div class="section-label">Workout streak — last 8 weeks</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>Done</div>
        <div class="legend-item"><div class="legend-dot" style="background:#F09595"></div>Missed</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--surface-1)"></div>Rest</div>
      </div>
      <div class="streak-cal" id="streak-cal"></div>

      <div class="section-label">Inches lost per area</div>
      <div id="measure-bars" style="margin-bottom:16px"></div>

      <div class="section-label">Your wins</div>
      <div id="wins-section"></div>
    </div>
  </section>

  <!-- PLAN -->
  <section id="screen-plan" class="screen" aria-label="8-month plan">
    <div class="pad" id="plan-content"></div>
  </section>

  <!-- LOG -->
  <section id="screen-log" class="screen" aria-label="Log data">
    <div class="pad">
      <div class="log-tabs">
        <button id="ltab-measurements" class="log-tab on" onclick="showLogTab('measurements')">Measurements</button>
        <button id="ltab-weight"        class="log-tab"    onclick="showLogTab('weight')">Weight</button>
        <button id="ltab-food"          class="log-tab"    onclick="showLogTab('food')">Food log</button>
      </div>

      <!-- Measurements pane -->
      <div id="lpane-measurements" class="log-pane on">
        <div class="card">
          <div class="card-title" style="margin-bottom:14px">Log measurements</div>
          <div class="field-group">
            <label class="field-label" for="m-date">Date</label>
            <input type="date" id="m-date">
          </div>
          <div class="field-2col">
            <div><label class="field-label" for="m-waist">Waist (in)</label><input type="number" id="m-waist" placeholder="e.g. 48" step="0.25" min="0"></div>
            <div><label class="field-label" for="m-hips">Hips (in)</label><input type="number" id="m-hips" placeholder="e.g. 52" step="0.25" min="0"></div>
          </div>
          <div class="field-2col">
            <div><label class="field-label" for="m-thigh">Thigh (in)</label><input type="number" id="m-thigh" placeholder="e.g. 28" step="0.25" min="0"></div>
            <div><label class="field-label" for="m-chest">Chest (in)</label><input type="number" id="m-chest" placeholder="e.g. 54" step="0.25" min="0"></div>
          </div>
          <button class="log-btn" onclick="submitMeasurement()">
            <i class="ti ti-plus" style="font-size:15px;vertical-align:-2px;margin-right:5px" aria-hidden="true"></i>Save measurement
          </button>
        </div>
        <div class="section-label">History</div>
        <div id="m-history"></div>
      </div>

      <!-- Weight pane -->
      <div id="lpane-weight" class="log-pane">
        <div class="card">
          <div class="card-title" style="margin-bottom:14px">Log body weight</div>
          <div class="field-group">
            <label class="field-label" for="w-date">Date</label>
            <input type="date" id="w-date">
          </div>
          <div class="field-group">
            <label class="field-label" for="w-weight">Weight (lbs)</label>
            <input type="number" id="w-weight" placeholder="e.g. 302" step="0.5" min="100">
          </div>
          <button class="log-btn" onclick="submitWeight()">
            <i class="ti ti-plus" style="font-size:15px;vertical-align:-2px;margin-right:5px" aria-hidden="true"></i>Save weight
          </button>
        </div>
        <div class="section-label">History</div>
        <div id="w-history"></div>
      </div>

      <!-- Food log pane -->
      <div id="lpane-food" class="log-pane">
        <div class="tip-box" style="margin-bottom:12px">
          <div style="font-size:12px;font-weight:600;color:var(--text-accent);margin-bottom:3px">Week 1 habit</div>
          <div style="font-size:13px;color:var(--text-secondary);line-height:1.5">Just write down what you eat — no calorie counting needed yet. Awareness before action.</div>
        </div>
        <div class="card">
          <div class="card-title" style="margin-bottom:14px">Log today's food</div>
          <div class="field-2col">
            <div><label class="field-label" for="f-date">Date</label><input type="date" id="f-date"></div>
            <div><label class="field-label" for="f-time">Time</label><input type="time" id="f-time"></div>
          </div>
          <div class="field-group">
            <label class="field-label" for="f-food">What did you eat?</label>
            <input type="text" id="f-food" placeholder="e.g. 3 eggs, toast, coffee">
          </div>
          <button class="log-btn" onclick="submitFood()">
            <i class="ti ti-plus" style="font-size:15px;vertical-align:-2px;margin-right:5px" aria-hidden="true"></i>Log it
          </button>
        </div>
        <div class="section-label">Today's log</div>
        <div id="f-history"></div>
      </div>
    </div>
  </section>

</main>

<nav class="nav" aria-label="Main navigation">
  <button id="nav-today"    class="nav-btn active" onclick="showScreen('today')">
    <i class="ti ti-calendar-event" aria-hidden="true"></i>Today
  </button>
  <button id="nav-week"     class="nav-btn"        onclick="showScreen('week')">
    <i class="ti ti-layout-grid" aria-hidden="true"></i>Week
  </button>
  <button id="nav-progress" class="nav-btn"        onclick="showScreen('progress')">
    <i class="ti ti-chart-line" aria-hidden="true"></i>Progress
  </button>
  <button id="nav-plan"     class="nav-btn"        onclick="showScreen('plan')">
    <i class="ti ti-road" aria-hidden="true"></i>Plan
  </button>
  <button id="nav-log"      class="nav-btn"        onclick="showScreen('log')">
    <i class="ti ti-pencil" aria-hidden="true"></i>Log
  </button>
</nav>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="js/workouts.js"></script>
<script src="js/data.js"></script>
<script src="js/screens.js"></script>
<script src="js/app.js"></script>
</body>
</html>
